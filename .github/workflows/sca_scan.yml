name: SCA

on:
  push:
    branches: ["master", "v1", "v2"]
  pull_request:
    branches: ["master", "v1", "v2"]

jobs:
  snyk-cli:
    uses: auth0/devsecops-tooling/.github/workflows/sca-scan.yml@main
    with:
      additional-arguments: "--exclude=README.md"
      java-version: ${{ (github.ref == 'refs/heads/v1' || github.base_ref == 'v1') && '8' || '17' }}
    secrets: inherit
